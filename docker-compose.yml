x-crdb-common: &crdb-common
  image: cockroachdb/cockroach:latest
  command: start --insecure --join=crdb1,crdb2,crdb3 --http-addr=0.0.0.0:8080
  networks: [quorum-net]
  healthcheck:
    # Liveness only (process is up and serving HTTP) -- NOT ready=1, which
    # requires the cluster to already be initialized. crdb-init (below) is
    # what performs that initialization, so gating on ready=1 here would be
    # a circular dependency: init waits for healthy, healthy waits for init.
    test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    interval: 3s
    timeout: 3s
    retries: 20

services:
  crdb1:
    <<: *crdb-common
    hostname: crdb1
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - crdb1-data:/cockroach/cockroach-data

  crdb2:
    <<: *crdb-common
    hostname: crdb2
    ports:
      - "26258:26257"
    volumes:
      - crdb2-data:/cockroach/cockroach-data

  crdb3:
    <<: *crdb-common
    hostname: crdb3
    ports:
      - "26259:26257"
    volumes:
      - crdb3-data:/cockroach/cockroach-data

  crdb-init:
    image: cockroachdb/cockroach:latest
    depends_on:
      crdb1:
        condition: service_healthy
      crdb2:
        condition: service_healthy
      crdb3:
        condition: service_healthy
    networks: [quorum-net]
    volumes:
      - ./infra/crdb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    entrypoint: >
      /bin/sh -c "
        /cockroach/cockroach init --insecure --host=crdb1:26257 || true &&
        /cockroach/cockroach sql --insecure --host=crdb1:26257 -e 'CREATE DATABASE IF NOT EXISTS quorum;' &&
        /cockroach/cockroach sql --insecure --host=crdb1:26257 -d quorum --file /docker-entrypoint-initdb.d/init.sql
      "

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      # Overrides backend/.env's localhost DATABASE_URL -- inside the
      # compose network the CockroachDB nodes are reachable by service name,
      # not localhost. env_file values are defaults; explicit `environment`
      # entries win, per Compose's documented precedence.
      DATABASE_URL: postgresql://root@crdb1:26257/quorum?sslmode=disable
    ports:
      - "8000:8000"
    depends_on:
      crdb-init:
        condition: service_completed_successfully
    networks: [quorum-net]

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars are inlined at build time -- see frontend/Dockerfile.
        # Defaults to same-origin :8000 for local `docker compose up`; the
        # production deploy overrides this via the root .env (API_DOMAIN).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on: [backend]
    networks: [quorum-net]

  # HTTPS reverse proxy for the public EC2 deploy -- not part of local dev,
  # where frontend/backend are hit directly on their published ports above.
  # `docker compose --profile prod up -d` (see README) brings this up too,
  # once DOMAIN/API_DOMAIN are set in the root .env to real hostnames (Caddy
  # can't issue a Let's Encrypt cert for "localhost").
  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]
    environment:
      DOMAIN: ${DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on: [frontend, backend]
    networks: [quorum-net]

networks:
  quorum-net:
    driver: bridge

volumes:
  crdb1-data:
  crdb2-data:
  crdb3-data:
  caddy-data:
  caddy-config:
